      <p class="note">
        The Codex Gmail connector is blocked by a stale remote app-worker token. This page bypasses the
        connector and opens Gmail compose in your browser. Review each message before sending.
      </p>

    <script>
      function messageFrom(button) {
        return button.closest("[data-message]");
      }
      function fields(article) {
        return {
          to: article.querySelector("[data-to]").value,
          subject: article.querySelector("[data-subject]").value,
          body: article.querySelector("[data-body]").value
        };
      }
      function openGmail(button) {
        const data = fields(messageFrom(button));
        const url = "https://mail.google.com/mail/?view=cm&fs=1"
          + "&to=" + encodeURIComponent(data.to)
          + "&su=" + encodeURIComponent(data.subject)
          + "&body=" + encodeURIComponent(data.body);
        window.open(url, "_blank", "noopener,noreferrer");
      }
      async function copyBody(button) {
        const data = fields(messageFrom(button));
        await navigator.clipboard.writeText(data.body);
        button.textContent = "Copied";
      }
      async function copyAll(button) {
        const data = fields(messageFrom(button));
        await navigator.clipboard.writeText("To: " + data.to + "\nSubject: " + data.subject + "\n\n" + data.body);
        button.textContent = "Copied";
      }
    </script>
